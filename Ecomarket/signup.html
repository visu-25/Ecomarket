<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EcoMarket</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>🌱 EcoMarket</h1>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/cart/">Cart (<span id="cart-count">0</span>)</a>
                <a href="/account/">Account</a>
                <a href="/login/">Login</a>
                <a href="/signup/" class="active">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Signup Form -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Join EcoMarket</h2>
                <p class="auth-subtitle">Create your account and start shopping sustainably</p>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="signup-phone">Phone Number</label>
                        <input type="tel" id="signup-phone" required placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" required placeholder="Create a password" minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm-password">Confirm Password</label>
                        <input type="password" id="signup-confirm-password" required placeholder="Confirm your password">
                    </div>
                    <button type="submit" class="btn-primary">Create Account</button>
                    <p class="auth-link">
                        Already have an account? <a href="/login/">Login here</a>
                    </p>
                    <div id="signup-message" class="message"></div>
                </form>
            </div>
        </div>
    </section>

    <script src="/script.js"></script>
</body>
</html>
